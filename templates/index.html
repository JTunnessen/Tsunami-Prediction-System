<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tsunami Predictor</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background-color: #f4f4f9; }
        .container { background: white; padding: 20px; border-radius: 10px; display: inline-block; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); }
        input { margin: 10px; padding: 10px; width: 80%; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px 20px; background-color: #007bff; color: white; border: none; cursor: pointer; border-radius: 5px; }
        .result { margin-top: 20px; font-weight: bold; font-size: 1.2em; color: #d9534f; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Earthquake Tsunami Predictor</h2>
        <form action="/predict" method="POST">
            <input type="number" step="0.1" name="magnitude" placeholder="Magnitude (e.g. 7.2)" required><br>
            <input type="number" step="0.1" name="depth" placeholder="Depth in km (e.g. 30)" required><br>
            <input type="number" step="0.1" name="cdi" placeholder="CDI Intensity (e.g. 8)" required><br>
            <input type="number" step="0.1" name="mmi" placeholder="MMI Intensity (e.g. 7)" required><br>
            <button type="submit">Predict Tsunami</button>
        </form>
        {% if prediction_text %}
            <div class="result">{{ prediction_text }}</div>
        {% endif %}
    </div>
</body>
</html>
